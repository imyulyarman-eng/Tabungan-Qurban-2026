<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tabungan Qurban 2025</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="login-container" id="loginScreen" role="main">
    <div class="login-card" role="form" aria-labelledby="formTitle">
      <div class="icon-goat" aria-hidden="true">🐐</div>
      <h1 class="title" id="formTitle">Tabungan Qurban</h1>
      <small class="year">2025</small>

      <button id="fingerprintBtn" class="btn-fingerprint" type="button" aria-label="Login dengan fingerprint" style="display:none;">👆 Fingerprint</button>

      <input
        type="password"
        id="pinInput"
        maxlength="4"
        placeholder="• • • •"
        autocomplete="one-time-code"
        inputmode="numeric"
        pattern="\d*"
        aria-required="true"
        aria-describedby="pinHint"
      />
      <div class="label-pin" id="pinHint">Masukkan PIN 4 digit</div>

      <button id="loginBtn" class="btn-login" aria-label="Login dengan PIN">Masuk</button>

      <div id="loginStatus" class="login-status" aria-live="polite" aria-atomic="true"></div>
    </div>
  </div>

  <main id="mainApp" style="display: none;">
    <h2>Selamat datang di Dashboard Tabungan Qurban</h2>
    <button id="logoutBtn" class="btn-logout" aria-label="Logout aplikasi">Logout</button>
    <!-- Konten dashboard bisa dikembangkan -->
  </main>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
